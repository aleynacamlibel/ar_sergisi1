<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>23 Nisan AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
        body { margin: 0; overflow: hidden; }
        /* Başlat butonu - Mobil tarayıcı izinleri için şarttır */
        #start-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: sans-serif;
        }
        #btn {
            padding: 15px 40px; font-size: 18px; cursor: pointer;
            background: #d4212d; color: white; border: none; border-radius: 50px;
        }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h2>Atatürk AR Sergisi</h2>
        <button id="btn">DENEYİMİ BAŞLAT</button>
        <p style="margin-top: 20px; font-size: 12px; opacity: 0.6;">Kamera izni vermeyi unutmayın.</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4" 
                preload="auto" loop="true" crossorigin="anonymous" 
                webkit-playsinline playsinline>
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#btn');
        const overlay = document.querySelector('#start-overlay');
        const video = document.querySelector('#arVideo');
        const sceneEl = document.querySelector('a-scene');

        btn.addEventListener('click', () => {
            overlay.style.display = 'none';
            
            // Video oynatma izni al (iOS için kritik)
            video.play().then(() => {
                video.pause();
            });

            // AR Sistemini Manuel Başlat (Hata riskini azaltır)
            const { systems } = sceneEl;
            systems['mindar-image-system'].start();
        });

        const target = document.querySelector('#target');
        
        target.addEventListener("targetFound", () => {
            video.play();
        });

        target.addEventListener("targetLost", () => {
            video.pause();
        });
        
        // Hata ayıklama: Dosya yüklenemezse uyar
        sceneEl.addEventListener("arError", (event) => {
            alert("AR Başlatılamadı! Lütfen targets.mind dosyasının adını kontrol edin.");
        });
    </script>
</body>
</html>
