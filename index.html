<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>23 Nisan AR</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      body { margin: 0; overflow: hidden; }
      /* Yükleme ekranı takılmasın diye manuel bir başlat düğmesi ekleyelim */
      #ui {
        position: fixed; z-index: 1000; bottom: 20px; left: 50%;
        transform: translateX(-50%);
      }
      button { padding: 12px 24px; border-radius: 20px; border: none; background: #c00; color: white; font-weight: bold; }
    </style>
  </head>
  <body>

    <div id="ui">
      <button id="startButton">Sesi Aç ve Başlat</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiLoading: yes; uiScanning: yes;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ataturkVideo" src="video.mp4" 
               preload="auto" loop="true" crossorigin="anonymous" 
               webkit-playsinline playsinline muted></video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="example-target" mindar-image-target="targetIndex: 0">
        <a-video src="#ataturkVideo" width="1" height="0.56" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const video = document.querySelector('#ataturkVideo');
      const button = document.querySelector('#startButton');
      const target = document.querySelector('#example-target');

      // Butona basıldığında videonun sesini açar ve tam yetki alır
      button.addEventListener('click', () => {
        video.muted = false;
        video.play();
        button.style.display = 'none'; // Butonu gizle
      });

      target.addEventListener("targetFound", () => {
        video.play();
      });

      target.addEventListener("targetLost", () => {
        video.pause();
      });
    </script>
  </body>
</html>
