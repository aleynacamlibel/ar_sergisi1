<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>23 Nisan AR Sergisi v1.1</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; text-align: center;
        }
        #start-btn {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: #D4212D; color: white; border: none; border-radius: 50px;
            font-weight: bold; display: none; /* Dosya yüklenene kadar gizli */
        }
        #loader-text { margin-bottom: 20px; font-size: 18px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="loader-text">Dosyalar Doğrulanıyor...</div>
        <button id="start-btn">SERGİYİ BAŞLAT</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind?v=1.1; autoStart: false; uiLoading: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4?v=1.1" preload="auto" loop="true" 
                   crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#start-btn');
        const loaderText = document.querySelector('#loader-text');
        const sceneEl = document.querySelector('a-scene');

        // Dosya kontrol mekanizması (Versiyonlu kontrol)
        fetch('targets.mind?v=1.1')
            .then(res => {
                if(res.ok) {
                    loaderText.innerText = "Yükleme Tamamlandı!";
                    btn.style.display = "block";
                } else {
                    loaderText.style.color = "yellow";
                    loaderText.innerText = "HATA: targets.mind dosyası klasörde bulunamadı!";
                }
            })
            .catch(() => {
                loaderText.innerText = "Bağlantı hatası oluştu.";
            });

        btn.addEventListener('click', () => {
            document.querySelector('#overlay').style.display = 'none';
            const video = document.querySelector('#arVideo');
            video.play().then(() => video.pause()); 
            sceneEl.systems['mindar-image-system'].start();
        });

        const target = document.querySelector('#target');
        target.addEventListener("targetFound", () => document.querySelector('#arVideo').play());
        target.addEventListener("targetLost", () => document.querySelector('#arVideo').pause());
    </script>
</body>
</html>
