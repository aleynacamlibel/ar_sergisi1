<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>23 Nisan AR Sergisi v2.0</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; text-align: center; padding: 20px;
        }
        #start-btn {
            padding: 15px 40px; font-size: 20px; cursor: pointer;
            background: #D4212D; color: white; border: none; border-radius: 50px;
            font-weight: bold; display: none; margin-top: 20px;
        }
        #status-text { font-size: 16px; color: #fff; }
        #error-log { font-size: 12px; color: #ff5555; margin-top: 15px; max-width: 80%; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="status-text">Dosyalar aranıyor...</div>
        <div id="error-log"></div>
        <button id="start-btn">KAMERAYI AÇ VE BAŞLAT</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind?v=2; autoStart: false; uiLoading: no; uiScanning: no;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="arVideo" src="video.mp4?v=2" preload="auto" loop="true" 
                   crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#arVideo" width="1" height="0.67" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const btn = document.querySelector('#start-btn');
        const statusText = document.querySelector('#status-text');
        const errorLog = document.querySelector('#error-log');
        const sceneEl = document.querySelector('a-scene');

        // DOSYA DOĞRULAMA: Dosyanın gerçekten orada olup olmadığını kontrol et
        async function checkFiles() {
            try {
                // targets.mind dosyasını bulmaya çalış
                const response = await fetch('targets.mind?v=2');
                if (response.ok) {
                    statusText.innerText = "Bağlantı Başarılı!";
                    btn.style.display = "block";
                } else {
                    statusText.innerText = "Dosya Hatası!";
                    errorLog.innerText = "Hata 404: 'targets.mind' dosyası index.html ile aynı klasörde değil veya adı yanlış. (Şu anki konum: " + window.location.pathname + ")";
                }
            } catch (err) {
                statusText.innerText = "Erişim Reddedildi!";
                errorLog.innerText = "Sunucu dosyaya erişime izin vermiyor: " + err.message;
            }
        }

        checkFiles();

        btn.addEventListener('click', () => {
            document.querySelector('#overlay').style.display = 'none';
            const video = document.querySelector('#arVideo');
            video.play().then(() => video.pause()); 
            sceneEl.systems['mindar-image-system'].start();
        });

        const target = document.querySelector('#target');
        target.addEventListener("targetFound", () => {
            console.log("Hedef bulundu!");
            document.querySelector('#arVideo').play();
        });
        target.addEventListener("targetLost", () => {
            document.querySelector('#arVideo').pause();
        });
    </script>
</body>
</html>
