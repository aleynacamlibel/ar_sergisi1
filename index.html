<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

      /* Sağ Üst Versiyon Bilgisi */
      #version-tag {
        position: absolute; top: 15px; right: 15px; z-index: 999;
        background: rgba(0, 0, 0, 0.6); color: white; padding: 5px 12px;
        border-radius: 20px; font-size: 11px; letter-spacing: 1px;
      }

      /* Başlat Butonu Arayüzü */
      #ui-overlay {
        position: absolute; inset: 0; z-index: 1000;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.8); color: white; transition: 0.5s;
      }

      button {
        padding: 15px 35px; border: none; border-radius: 50px;
        background: #D4AF37; color: black; font-weight: bold; font-size: 16px;
        cursor: pointer; box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
      }
      
      p { margin-top: 15px; font-size: 14px; opacity: 0.8; }
    </style>
  </head>
  <body>

    <div id="version-tag">AR ENGINE v1.2</div>

    <div id="ui-overlay">
      <button id="startButton">SERGİYİ BAŞLAT</button>
      <p>Kameraya izin verin ve fotoğrafı tarayın.</p>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false; uiLoading: no; uiScanning: no; filterMinCF:0.0001; filterBeta: 0.001;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="arVideo" 
               src="Egemenliğin ışığı, çocukların neşesiyle parlıyor.10.mp4" 
               preload="auto" loop="true" crossorigin="anonymous" 
               playsinline webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#arVideo" 
                 width="1" height="0.65" 
                 position="0 0 0" 
                 rotation="0 0 0">
        </a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startButton = document.querySelector('#startButton');
      const overlay = document.querySelector('#ui-overlay');
      const video = document.querySelector('#arVideo');

      // Butonla başlatma (iOS Safari ve Chrome için zorunlu)
      startButton.addEventListener('click', () => {
        sceneEl.systems["mindar-image-system"].start();
        // Videoyu "hazırla"
        video.play().then(() => {
          video.pause();
          video.currentTime = 0;
        });
        overlay.style.opacity = '0';
        setTimeout(() => overlay.style.display = 'none', 500);
      });

      // Görsel tanındığında/kaybolduğunda yapılacaklar
      const targetEntity = document.querySelector('#target');
      
      targetEntity.addEventListener("targetFound", () => {
        console.log("Atatürk Fotoğrafı Bulundu!");
        video.play();
      });

      targetEntity.addEventListener("targetLost", () => {
        console.log("Hedef Kaybedildi.");
        video.pause();
      });
    </script>
  </body>
</html>
