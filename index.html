<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>23 Nisan AR Sergisi</title>
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            color: white; font-family: sans-serif; text-align: center;
        }
        button {
            padding: 15px 30px; font-size: 18px; cursor: pointer;
            background: #D4212D; color: white; border: none; border-radius: 50px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h2>23 Nisan AR Deneyimi</h2>
        <p>Kamerayı açmak için aşağıdaki butona basın.</p>
        <button id="start-btn">KAMERAYI BAŞLAT</button>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: targets.mind; autoStart: false; uiLoading: yes;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="ar-video" src="video.mp4" preload="auto" loop="true" 
                   crossorigin="anonymous" webkit-playsinline playsinline></video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#ar-video" width="1" height="0.56" position="0 0 0"></a-video>
        </a-entity>
    </a-scene>

    <script>
        const startBtn = document.querySelector('#start-btn');
        const overlay = document.querySelector('#overlay');
        const sceneEl = document.querySelector('a-scene');
        const video = document.querySelector('#ar-video');

        startBtn.addEventListener('click', () => {
            overlay.style.display = 'none';
            
            // Video ve AR sistemini başlat
            video.play().then(() => video.pause()); 
            sceneEl.systems['mindar-image-system'].start();
        });

        // HATA KONTROLÜ: Eğer targets.mind yüklenemezse haber ver
        sceneEl.addEventListener("arError", (event) => {
            alert("Hata: targets.mind dosyasına ulaşılamıyor! Lütfen GitHub'da dosya adının doğruluğunu kontrol edin.");
        });

        const targetEntity = document.querySelector('#target');
        targetEntity.addEventListener("targetFound", () => video.play());
        targetEntity.addEventListener("targetLost", () => video.pause());
    </script>
</body>
</html>
