<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
    
    <style>
      body { margin: 0; overflow: hidden; }
      /* Başlatma butonu (iOS için şart) */
      #ui-layer {
        position: absolute; z-index: 1000; bottom: 20px; left: 50%;
        transform: translateX(-50%);
      }
      button {
        padding: 10px 20px; border-radius: 20px; border: none;
        background: #e61919; color: white; font-weight: bold;
      }
    </style>
  </head>
  <body>

    <div id="ui-layer">
      <button id="startButton">AR'ı BAŞLAT / VİDEOYU OYNAT</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
      color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <video id="ar-video" 
               src="./Egemenliğin ışığı, çocukların neşesiyle parlıyor.10.mp4" 
               preload="auto" loop="true" 
               crossorigin="anonymous" 
               playsinline 
               webkit-playsinline>
        </video>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <a-entity id="target" mindar-image-target="targetIndex: 0">
        <a-video src="#ar-video" width="1" height="0.6" position="0 0 0"></a-video>
      </a-entity>
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startButton = document.querySelector('#startButton');
      const video = document.querySelector('#ar-video');

      startButton.addEventListener('click', () => {
        // AR'ı başlat
        sceneEl.systems["mindar-image-system"].start();
        // Videoyu "hazır" duruma getir
        video.play();
        // UI'ı gizle
        document.querySelector('#ui-layer').style.display = 'none';
      });

      // Target bulunduğunda videoyu oynat, kaybolunca duraklat
      const targetEntity = document.querySelector('#target');
      targetEntity.addEventListener("targetFound", event => {
        video.play();
      });
      targetEntity.addEventListener("targetLost", event => {
        video.pause();
      });
    </script>
  </body>
</html>
